name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Download MediaMTX
        run: |
          curl -sL "https://github.com/bluenviron/mediamtx/releases/download/v1.11.3/mediamtx_v1.11.3_linux_amd64.tar.gz" \
            | tar xz mediamtx
          chmod +x mediamtx

      - name: Create plugin zip
        run: |
          mkdir -p Prysm/{dist,backend,bin,defaults}
          cp plugin.json package.json main.py LICENSE README.md Prysm/
          cp dist/index.js Prysm/dist/
          cp server/stream_server.py Prysm/backend/
          cp bin/mediamtx.yml Prysm/bin/
          cp defaults/settings.json Prysm/defaults/
          cp mediamtx Prysm/bin/
          zip -r Prysm-dev.zip Prysm/

      - uses: actions/upload-artifact@v4
        with:
          name: Prysm-dev
          path: Prysm-dev.zip
