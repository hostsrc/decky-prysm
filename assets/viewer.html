<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prysm — Steam Deck Stream</title>
  <style>
    :root {
      --prysm-purple: oklch(68% 0.21 290);
      --prysm-blue: oklch(62% 0.2 250);
      --surface: oklch(10% 0.01 280);
      --surface-2: oklch(14% 0.01 280);
      --text: oklch(92% 0 0);
      --text-muted: oklch(60% 0 0);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--surface);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- Top bar ---------- */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    body:hover .topbar,
    body.controls-visible .topbar {
      opacity: 1;
      pointer-events: auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-text {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--prysm-purple), var(--prysm-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
      animation: pulse 2s infinite;
    }

    .status-dot.offline {
      background: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ---------- Video ---------- */
    #player {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000;
      cursor: pointer;
    }

    /* ---------- Loading state ---------- */
    .loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--surface);
      z-index: 200;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(168, 85, 247, 0.15);
      border-top-color: var(--prysm-purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* ---------- Bottom bar ---------- */
    .bottombar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px 20px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.85), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    body:hover .bottombar,
    body.controls-visible .bottombar {
      opacity: 1;
      pointer-events: auto;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      backdrop-filter: blur(12px);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn.muted {
      border-color: rgba(239, 68, 68, 0.4);
      color: #fca5a5;
    }

    /* ---------- Fullscreen hint ---------- */
    .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 600px) {
      .topbar { padding: 8px 12px; }
      .logo-text { font-size: 0.9rem; }
      .bottombar { padding: 12px; gap: 8px; }
      .btn { padding: 8px 14px; font-size: 0.8rem; }
    }

    /* ---------- SVG prism logo ---------- */
    .prism-svg {
      filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.4));
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div class="loading-overlay" id="loading">
    <svg class="prism-svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
      <path d="M32 4L58 56H6L32 4Z" stroke="url(#grad)" stroke-width="2.5" fill="none" />
      <path d="M32 20L44 48H20L32 20Z" fill="url(#grad)" opacity="0.15" />
      <defs>
        <linearGradient id="grad" x1="6" y1="56" x2="58" y2="4">
          <stop offset="0%" stop-color="#a855f7" />
          <stop offset="100%" stop-color="#3b82f6" />
        </linearGradient>
      </defs>
    </svg>
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">Connecting to Steam Deck...</div>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">
      <svg class="prism-svg logo-icon" viewBox="0 0 64 64" fill="none">
        <path d="M32 4L58 56H6L32 4Z" stroke="url(#g2)" stroke-width="2.5" fill="none" />
        <path d="M32 20L44 48H20L32 20Z" fill="url(#g2)" opacity="0.2" />
        <defs>
          <linearGradient id="g2" x1="6" y1="56" x2="58" y2="4">
            <stop offset="0%" stop-color="#a855f7" />
            <stop offset="100%" stop-color="#3b82f6" />
          </linearGradient>
        </defs>
      </svg>
      <span class="logo-text">PRYSM</span>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting</span>
    </div>
  </div>

  <!-- Video player -->
  <video id="player" autoplay muted playsinline></video>

  <!-- Bottom controls -->
  <div class="bottombar">
    <button class="btn" id="mute-btn" onclick="toggleMute()">
      <span id="mute-icon">🔇</span>
      <span id="mute-label">Unmute</span>
    </button>
    <button class="btn" onclick="toggleFullscreen()">
      <span>⛶</span>
      <span>Fullscreen</span>
    </button>
    <span class="hint">Click video to toggle audio</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <script>
    const video = document.getElementById('player');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loading-text');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const muteBtn = document.getElementById('mute-btn');
    const muteIcon = document.getElementById('mute-icon');
    const muteLabel = document.getElementById('mute-label');

    const HLS_SRC = '/stream.m3u8';
    let hls = null;
    let retryCount = 0;
    const MAX_RETRIES = 30;

    function setStatus(online, text) {
      statusDot.className = online ? 'status-dot' : 'status-dot offline';
      statusText.textContent = text;
    }

    function hideLoading() {
      loading.classList.add('hidden');
    }

    function showLoading(text) {
      loading.classList.remove('hidden');
      loadingText.textContent = text;
    }

    function toggleMute() {
      video.muted = !video.muted;
      updateMuteUI();
    }

    function updateMuteUI() {
      if (video.muted) {
        muteIcon.textContent = '🔇';
        muteLabel.textContent = 'Unmute';
        muteBtn.classList.add('muted');
      } else {
        muteIcon.textContent = '🔊';
        muteLabel.textContent = 'Mute';
        muteBtn.classList.remove('muted');
      }
    }

    function toggleFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen();
      }
    }

    // Click video to toggle mute
    video.addEventListener('click', toggleMute);

    // Auto-hide controls
    let hideTimeout;
    function showControls() {
      document.body.classList.add('controls-visible');
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(() => {
        document.body.classList.remove('controls-visible');
      }, 3000);
    }
    document.addEventListener('mousemove', showControls);
    document.addEventListener('touchstart', showControls);

    // HLS setup
    function initHLS() {
      if (Hls.isSupported()) {
        hls = new Hls({
          liveSyncDuration: 1,
          liveMaxLatencyDuration: 2,
          liveDurationInfinity: true,
          enableWorker: true,
          lowLatencyMode: true,
          highBufferWatchdogPeriod: 1,
          maxBufferLength: 2,
          maxMaxBufferLength: 4,
          backBufferLength: 0,
        });

        hls.loadSource(HLS_SRC);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {});
          hideLoading();
          setStatus(true, 'Live');
          retryCount = 0;
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            console.warn('HLS fatal error:', data.type, data.details);
            setStatus(false, 'Reconnecting...');

            if (retryCount < MAX_RETRIES) {
              retryCount++;
              loadingText.textContent = `Reconnecting... (${retryCount}/${MAX_RETRIES})`;
              setTimeout(() => {
                hls.destroy();
                initHLS();
              }, 2000);
            } else {
              showLoading('Stream ended or unavailable');
              setStatus(false, 'Offline');
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Native HLS (Safari / iOS)
        video.src = HLS_SRC;
        video.addEventListener('loadedmetadata', () => {
          video.play().catch(() => {});
          hideLoading();
          setStatus(true, 'Live');
        });
        video.addEventListener('error', () => {
          setStatus(false, 'Reconnecting...');
          setTimeout(() => { video.src = HLS_SRC; }, 2000);
        });
      }
    }

    // Start
    initHLS();
  </script>
</body>
</html>
